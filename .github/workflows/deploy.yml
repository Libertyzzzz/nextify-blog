name: Nextify Blog Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # 使用官方内置方式配置，不覆盖中央仓库
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN
          cache: maven

      - name: Maven 构建
        # 直接运行 mvn，不再手动写 settings.xml
        # -am 表示同时构建依赖的 api 模块
        run: mvn clean package -DskipTests -U -am -e
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传 JAR 到服务器
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          password: ${{ secrets.SERVER_SSH_KEY }}
          # 核心：指向 blog-service 模块
          # ....
          source: "blog-service/target/*.jar"
          target: "/home/dust/app/nextify-blog"
          # 核心：剥离 2 层目录，让 jar 包直接躺在 nextify-blog 文件夹里
          strip_components: 2

      - name: SSH 远程重启
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          password: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/dust/app/nextify-blog
            # 停止 8080 端口进程
            fuser -k 8080/tcp || true
            # 启动
            echo "Starting Nextify Blog..."
            nohup java -Xms512m -Xmx512m -jar *.jar --spring.profiles.active=prod > app.log 2>&1 &
            sleep 5
            ps -ef | grep java | grep nextify-blog