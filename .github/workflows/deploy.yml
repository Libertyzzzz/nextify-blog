name: Nextify Blog Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 针对 JDK 17 和 GitHub Packages 配置 Maven (如果你的项目依赖 GitHub 私有库)
      - name: Configure Maven Settings
        run: |
          mkdir -p ~/.m2
          echo "<settings><servers><server><id>github</id><username>${{ github.actor }}</username><password>${{ secrets.GITHUB_TOKEN }}</password></server></servers></settings>" > ~/.m2/settings.xml

      # 在根目录执行构建，Maven 会自动处理 blog-service 模块
      - name: Build with Maven
        run: mvn clean package -DskipTests -U
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 仅传输 blog-service 模块下的 JAR 文件到服务器
      - name: Upload JAR to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          password: ${{ secrets.SERVER_SSH_KEY }}
          # 指向代码所在模块的打包目录
          source: "blog-service/target/*.jar"
          # 服务器上的目标存放目录
          target: "/home/dust/app/nextify-blog"
          # 关键：剥离路径中的 "blog-service/target/" (共2层)，使 JAR 直接放在目标目录下
          strip_components: 2
