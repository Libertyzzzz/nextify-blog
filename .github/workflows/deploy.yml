name: Nextify Blog Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # 使用官方内置方式配置，不覆盖中央仓库
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN
          cache: maven

      - name: Maven 构建
        # 直接运行 mvn，不再手动写 settings.xml
        # -am 表示同时构建依赖的 api 模块
        run: mvn clean package -DskipTests -U -am -e
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传 JAR 到服务器
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          password: ${{ secrets.SERVER_SSH_KEY }}
          # 核心：指向 blog-service 模块
          # .......
          source: "blog-service/target/*.jar"
          target: "/home/dust/app/nextify-blog"
          # 核心：剥离 2 层目录，让 jar 包直接躺在 nextify-blog 文件夹里
          strip_components: 2

      - name: SSH 远程重启
        uses: appleboy/ssh-action@master
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          password: ${{ secrets.SERVER_SSH_KEY }}
          # 定义环境变量，方便在 script 中引用
          envs: DB_PASSWORD
          script: |
            set -e
            APP_HOME=/home/dust/app/nextify-blog
            JAR=blog-service-1.0.0-SNAPSHOT.jar
            cd $APP_HOME
            
            if [ ! -f "$JAR" ]; then
              echo "Jar not found: $JAR"
              exit 1
            fi
            
            echo "Stopping old process..."            
            # Use a more flexible pgrep to match the *.jar used for starting
            PIDS=$(pgrep -f "$JAR" || true)

            if [ -n "$PIDS" ]; then

              echo "Found processes:"
              echo "$PIDS"

              kill $PIDS || true

              echo "Waiting for shutdown..."

              sleep 8
              # one more time
              PIDS=$(pgrep -f "$JAR" || true)

              if [ -n "$PIDS" ]; then

                echo "Force killing remaining processes..."
                kill -9 $PIDS || true
                sleep 3

              fi

            else

              echo "No old process found"

            fi
            
            echo "Starting Nextify Blog..."
            # 1. 使用 --spring.config.additional-location 指定外部 config 目录
            # 2. 使用 -Dspring.datasource.password 动态注入密码
            nohup java -Xms256m -Xmx512m -XX:+HeapDumpOnOutOfMemoryError \
              -jar $JAR \
              --spring.profiles.active=prod \
              --spring.config.additional-location=file:../config/ \
              --spring.datasource.password="$DB_PASSWORD" \
              > app.log 2>&1 &
            
            NEW_PID=$!
            echo "New PID=$NEW_PID"            
            sleep 15
            
            if ps -p $NEW_PID > /dev/null;
            then
              echo "Application started successfully"
            else
              echo "Application failed to start"
              echo "====== LOG ======"
              tail -100 app.log
              exit 1
            fi  
            
            echo "Checking port 8080..."
            if ss -tunlp | grep 8080;
            then
              echo "Port 8080 OK"
            else
              echo "Port 8080 not found"
              tail -100 app.log
              exit 1
            fi

            echo "========== Deploy Success =========="